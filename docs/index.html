<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATLAS PA Agent Implementation Dashboard</title>
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("scoutTheme");
      const theme =
        param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f7f4ef;
      --cp-bg-elevated: #fcfbf8;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f5f5f5;
      --cp-border: #dedede;
      --cp-border-strong: #919191;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-text-soft: #6f6f6f;
      --cp-accent: #b11f4b;
      --cp-accent-hover: #9a1a41;
      --cp-accent-soft: rgba(177, 31, 75, 0.08);
      --cp-accent-fg: #ffffff;
      --cp-success: #16a34a;
      --cp-danger: #dc2626;
      --cp-warning: #f59e0b;
      --cp-link: #0078d4;
      --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
      --cp-overlay: rgba(255, 255, 255, 0.8);
      --cp-panel: rgba(255, 255, 255, 0.86);
      --cp-panel-strong: rgba(255, 255, 255, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.55);
      --cp-highlight: rgba(177, 31, 75, 0.12);
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --cp-bg: #3d3b3a;
      --cp-bg-elevated: #343231;
      --cp-surface: #292929;
      --cp-surface-soft: #2e2e2e;
      --cp-border: #474747;
      --cp-border-strong: #5f5f5f;
      --cp-text: #dedede;
      --cp-text-muted: #919191;
      --cp-text-soft: #b0b0b0;
      --cp-accent: #fd8ea1;
      --cp-accent-hover: #fb7b91;
      --cp-accent-soft: rgba(253, 142, 161, 0.14);
      --cp-accent-fg: #1a1a1a;
      --cp-success: #4ade80;
      --cp-danger: #f87171;
      --cp-warning: #fbbf24;
      --cp-link: #4da6ff;
      --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      --cp-overlay: rgba(41, 41, 41, 0.88);
      --cp-panel: rgba(41, 41, 41, 0.72);
      --cp-panel-strong: rgba(41, 41, 41, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.04);
      --cp-highlight: rgba(253, 142, 161, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--cp-bg);
      color: var(--cp-text);
      font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 24px;
      background: var(--cp-panel-strong);
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      box-shadow: 0 0 2px var(--cp-highlight), 0 1px 2px var(--cp-border);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--cp-accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--cp-accent);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero p {
      max-width: 820px;
      margin-top: 12px;
      color: var(--cp-text-muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-surface);
      color: var(--cp-text);
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }

    .button:hover {
      border-color: var(--cp-border-strong);
      background: var(--cp-surface-soft);
    }

    .button.primary {
      border-color: var(--cp-accent);
      background: var(--cp-accent);
      color: var(--cp-accent-fg);
      font-weight: 700;
    }

    .button.primary:hover {
      border-color: var(--cp-accent-hover);
      background: var(--cp-accent-hover);
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin: 16px 0;
    }

    .search,
    .select {
      min-height: 44px;
      width: 100%;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-surface);
      color: var(--cp-text);
      padding: 0 14px;
      outline: none;
    }

    .search:focus,
    .select:focus {
      border-color: var(--cp-accent);
      box-shadow: 0 0 0 3px var(--cp-accent-soft);
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab {
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--cp-surface);
      color: var(--cp-text-muted);
      cursor: pointer;
    }

    .tab.active {
      border-color: var(--cp-accent);
      background: var(--cp-accent-soft);
      color: var(--cp-accent);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      background: var(--cp-surface);
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      box-shadow: 0 0 2px var(--cp-highlight), 0 1px 2px var(--cp-border);
      overflow: hidden;
    }

    .card.pad {
      padding: 18px;
    }

    .span-3 {
      grid-column: span 3;
    }

    .span-4 {
      grid-column: span 4;
    }

    .span-5 {
      grid-column: span 5;
    }

    .span-7 {
      grid-column: span 7;
    }

    .span-8 {
      grid-column: span 8;
    }

    .span-12 {
      grid-column: span 12;
    }

    .metric-label {
      color: var(--cp-text-muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .metric-value {
      margin-top: 10px;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .metric-note {
      margin-top: 8px;
      color: var(--cp-text-soft);
      font-size: 13px;
      line-height: 1.4;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-head h2 {
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .small {
      color: var(--cp-text-muted);
      font-size: 13px;
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: var(--cp-surface-soft);
      border: 1px solid var(--cp-border);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: var(--value);
      border-radius: inherit;
      background: var(--cp-accent);
    }

    .progress-fill.success {
      background: var(--cp-success);
    }

    .progress-fill.warning {
      background: var(--cp-warning);
    }

    .progress-fill.danger {
      background: var(--cp-danger);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .module {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-bg-elevated);
    }

    .module h3 {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .module p {
      color: var(--cp-text-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--cp-border);
      background: var(--cp-surface);
      color: var(--cp-text-muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.done {
      border-color: var(--cp-success);
      color: var(--cp-success);
      background: var(--cp-surface);
    }

    .badge.risk {
      border-color: var(--cp-warning);
      color: var(--cp-warning);
      background: var(--cp-surface);
    }

    .badge.blocked {
      border-color: var(--cp-danger);
      color: var(--cp-danger);
      background: var(--cp-surface);
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 12px;
    }

    .milestone {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-bg-elevated);
    }

    .milestone-marker {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--cp-border);
      display: grid;
      place-items: center;
      color: var(--cp-accent);
      background: var(--cp-surface);
      font-weight: 800;
      font-size: 12px;
    }

    .milestone h3 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .milestone p {
      color: var(--cp-text-muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .risk-list {
      display: grid;
      gap: 10px;
    }

    .risk-item {
      padding: 12px;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-bg-elevated);
    }

    .risk-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .risk-item p {
      color: var(--cp-text-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .bar-chart {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 132px 1fr 48px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--cp-text-muted);
    }

    .bar {
      height: 12px;
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      background: var(--cp-surface-soft);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--value);
      background: var(--cp-accent);
    }

    .decision-table {
      width: 100%;
      border-collapse: collapse;
    }

    .decision-table th,
    .decision-table td {
      padding: 12px;
      border-bottom: 1px solid var(--cp-border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    .decision-table th {
      color: var(--cp-text-muted);
      font-weight: 800;
      background: var(--cp-surface-soft);
    }

    .decision-table tr:last-child td {
      border-bottom: 0;
    }

    .owner-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .owner {
      padding: 12px;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-bg-elevated);
    }

    .owner strong {
      display: block;
      margin-bottom: 4px;
    }

    .owner span {
      color: var(--cp-text-muted);
      font-size: 13px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--cp-text-muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .span-3,
      .span-4,
      .span-5,
      .span-7,
      .span-8 {
        grid-column: span 6;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 12px;
      }

      .hero,
      .filters,
      .module,
      .milestone {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .span-3,
      .span-4,
      .span-5,
      .span-7,
      .span-8,
      .span-12 {
        grid-column: span 12;
      }

      .bar-row {
        grid-template-columns: 1fr;
      }

      .owner-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <section class="hero">
        <div>
          <div class="eyebrow"><span class="dot"></span> ATLAS PA Agent</div>
          <h1>Implementation Status Dashboard</h1>
          <p>
            A working view of the Copilot Studio build: topics, global variables, knowledge, tools,
            prompt nodes, document output, SCORM matching, and production readiness gates.
          </p>
        </div>
        <div class="toolbar">
          <button class="button" id="themeToggle" type="button">Toggle theme</button>
          <button class="button primary" id="resetButton" type="button">Reset filters</button>
        </div>
      </section>

      <section class="filters" aria-label="Dashboard filters">
        <input class="search" id="searchInput" type="search" placeholder="Search modules, risks, owners, or decisions..." />
        <select class="select" id="statusFilter" aria-label="Status filter">
          <option value="all">All statuses</option>
          <option value="done">Done</option>
          <option value="active">Active</option>
          <option value="risk">Risk</option>
          <option value="blocked">Blocked</option>
        </select>
        <select class="select" id="areaFilter" aria-label="Area filter">
          <option value="all">All areas</option>
          <option value="studio">Copilot Studio</option>
          <option value="content">Content & Knowledge</option>
          <option value="documents">Document Output</option>
          <option value="scorm">SCORM</option>
          <option value="release">Release</option>
        </select>
      </section>

      <nav class="tabs" aria-label="Dashboard sections">
        <button class="tab active" type="button" data-tab="overview">Overview</button>
        <button class="tab" type="button" data-tab="delivery">Delivery</button>
        <button class="tab" type="button" data-tab="risks">Risks</button>
        <button class="tab" type="button" data-tab="decisions">Decisions</button>
      </nav>

      <section class="grid" id="dashboard"></section>
      <p class="footer-note">Use the URL query string <code>?scoutTheme=dark</code> or <code>?scoutTheme=light</code> to force a theme.</p>
    </div>
  </main>

  <script>
    const state = {
      tab: "overview",
      query: "",
      status: "all",
      area: "all",
    };

    const modules = [
      {
        name: "Conversation entry topics",
        area: "studio",
        status: "done",
        progress: 85,
        owner: "Agent build",
        description: "Primary intents and routing logic for PA creation, revision, SCORM request, and document output.",
      },
      {
        name: "Global variable model",
        area: "studio",
        status: "active",
        progress: 70,
        owner: "Data design",
        description: "Shared variables for request metadata, learner profile, course context, selected template, and output links.",
      },
      {
        name: "Knowledge grounding",
        area: "content",
        status: "active",
        progress: 64,
        owner: "Knowledge",
        description: "Knowledge sources and prompt constraints for PA standards, templates, course language, and internal guidance.",
      },
      {
        name: "Prompt node orchestration",
        area: "studio",
        status: "active",
        progress: 58,
        owner: "Prompt design",
        description: "Drafting, validation, summarization, and structured extraction prompts wired to topic flow.",
      },
      {
        name: "Word document output",
        area: "documents",
        status: "risk",
        progress: 48,
        owner: "Document automation",
        description: "Template population and editable content control reliability for final PA documents.",
      },
      {
        name: "SCORM course matching",
        area: "scorm",
        status: "risk",
        progress: 44,
        owner: "Course retrieval",
        description: "Request-to-course matching, confidence scoring, and SharePoint file return flow.",
      },
      {
        name: "Human review checkpoints",
        area: "release",
        status: "active",
        progress: 62,
        owner: "Quality",
        description: "Review gates for source grounding, missing fields, course fit, and final output readiness.",
      },
      {
        name: "Production pilot readiness",
        area: "release",
        status: "blocked",
        progress: 35,
        owner: "Release",
        description: "Pilot cannot start until document output and course matching have deterministic acceptance criteria.",
      },
    ];

    const risks = [
      {
        title: "Editable Word output",
        severity: "High",
        status: "risk",
        area: "documents",
        detail: "Template controls need to stay editable after population; validate content control XML before production use.",
      },
      {
        title: "Course match confidence",
        severity: "High",
        status: "risk",
        area: "scorm",
        detail: "SCORM matching needs a fallback path when top result confidence is too low or multiple courses look similar.",
      },
      {
        title: "Variable drift across topics",
        severity: "Medium",
        status: "active",
        area: "studio",
        detail: "Global variables must be normalized so prompt nodes do not use conflicting names for the same PA fields.",
      },
      {
        title: "Knowledge freshness",
        severity: "Medium",
        status: "active",
        area: "content",
        detail: "Source documents need ownership and update cadence before the agent is treated as production reliable.",
      },
    ];

    const decisions = [
      {
        decision: "Build around Copilot Studio-native capabilities first",
        owner: "Product",
        status: "Active",
        rationale: "Keeps the implementation maintainable for business owners and reduces external service dependency.",
      },
      {
        decision: "Use structured variables before document generation",
        owner: "Agent build",
        status: "Active",
        rationale: "Improves prompt reliability and makes generated PA documents easier to validate.",
      },
      {
        decision: "Gate pilot on document and SCORM acceptance tests",
        owner: "Release",
        status: "Pending",
        rationale: "Prevents a demo-quality launch where final deliverables are hard to edit or course retrieval is inconsistent.",
      },
    ];

    const milestones = [
      {
        title: "Foundation flow",
        date: "Week 1",
        status: "done",
        description: "Topic map, variable model, and initial PA drafting path.",
      },
      {
        title: "Document output hardening",
        date: "Week 2",
        status: "active",
        description: "Template reliability, editable output, and review-ready final document.",
      },
      {
        title: "SCORM matching pilot",
        date: "Week 3",
        status: "risk",
        description: "Course request matching, confidence handling, and SharePoint return path.",
      },
      {
        title: "Controlled production pilot",
        date: "Week 4",
        status: "blocked",
        description: "Small-group release after acceptance criteria and support path are complete.",
      },
    ];

    const statusLabel = {
      done: "Done",
      active: "Active",
      risk: "Risk",
      blocked: "Blocked",
    };

    const areaLabel = {
      studio: "Copilot Studio",
      content: "Content & Knowledge",
      documents: "Document Output",
      scorm: "SCORM",
      release: "Release",
    };

    const dashboard = document.querySelector("#dashboard");
    const searchInput = document.querySelector("#searchInput");
    const statusFilter = document.querySelector("#statusFilter");
    const areaFilter = document.querySelector("#areaFilter");
    const resetButton = document.querySelector("#resetButton");
    const themeToggle = document.querySelector("#themeToggle");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    function matches(item) {
      const query = state.query.trim().toLowerCase();
      const text = Object.values(item).join(" ").toLowerCase();
      const statusMatch = state.status === "all" || item.status === state.status;
      const areaMatch = state.area === "all" || item.area === state.area;
      const queryMatch = !query || text.includes(query);
      return statusMatch && areaMatch && queryMatch;
    }

    function filteredModules() {
      return modules.filter(matches);
    }

    function filteredRisks() {
      return risks.filter(matches);
    }

    function averageProgress(items) {
      if (!items.length) return 0;
      return Math.round(items.reduce((sum, item) => sum + item.progress, 0) / items.length);
    }

    function badge(status) {
      const className = status === "done" ? "done" : status === "blocked" ? "blocked" : status === "risk" ? "risk" : "";
      return `<span class="badge ${className}">${statusLabel[status] || status}</span>`;
    }

    function progressClass(value) {
      if (value < 40) return "danger";
      if (value < 60) return "warning";
      if (value >= 80) return "success";
      return "";
    }

    function renderMetrics(items) {
      const complete = items.filter((item) => item.status === "done").length;
      const atRisk = items.filter((item) => item.status === "risk" || item.status === "blocked").length;
      const readiness = averageProgress(items);
      const active = items.filter((item) => item.status === "active").length;
      return `
        <article class="card pad span-3">
          <div class="metric-label">Readiness</div>
          <div class="metric-value">${readiness}%</div>
          <div class="metric-note">Average progress across visible implementation modules.</div>
        </article>
        <article class="card pad span-3">
          <div class="metric-label">Completed modules</div>
          <div class="metric-value">${complete}/${items.length}</div>
          <div class="metric-note">Done items compared with the current filtered scope.</div>
        </article>
        <article class="card pad span-3">
          <div class="metric-label">Active workstreams</div>
          <div class="metric-value">${active}</div>
          <div class="metric-note">In-flight areas that need execution or validation.</div>
        </article>
        <article class="card pad span-3">
          <div class="metric-label">Risk items</div>
          <div class="metric-value">${atRisk}</div>
          <div class="metric-note">Risk or blocked items that should be cleared before pilot.</div>
        </article>
      `;
    }

    function renderModules(items) {
      const cards = items.map((item) => `
        <div class="module">
          <div>
            <h3>${item.name}</h3>
            <p>${item.description}</p>
            <p class="small">${areaLabel[item.area]} · ${item.owner}</p>
          </div>
          <div>
            ${badge(item.status)}
          </div>
          <div class="progress-track" style="--value: ${item.progress}%;">
            <div class="progress-fill ${progressClass(item.progress)}"></div>
          </div>
          <div class="small">${item.progress}%</div>
        </div>
      `).join("");

      return `
        <article class="card pad span-7">
          <div class="section-head">
            <h2>Implementation modules</h2>
            <span class="small">${items.length} visible</span>
          </div>
          <div class="stack">${cards || `<p class="small">No modules match the current filters.</p>`}</div>
        </article>
      `;
    }

    function renderAreaChart(items) {
      const areas = Object.keys(areaLabel).map((area) => {
        const areaItems = items.filter((item) => item.area === area);
        return {
          label: areaLabel[area],
          value: averageProgress(areaItems),
          count: areaItems.length,
        };
      }).filter((row) => row.count > 0);

      const bars = areas.map((row) => `
        <div class="bar-row">
          <span>${row.label}</span>
          <div class="bar" style="--value: ${row.value}%;"><span></span></div>
          <strong>${row.value}%</strong>
        </div>
      `).join("");

      return `
        <article class="card pad span-5">
          <div class="section-head">
            <h2>Readiness by area</h2>
            <span class="small">Filtered view</span>
          </div>
          <div class="bar-chart">${bars || `<p class="small">No areas match the current filters.</p>`}</div>
        </article>
      `;
    }

    function renderTimeline() {
      const rows = milestones.map((item, index) => `
        <div class="milestone">
          <div class="milestone-marker">${index + 1}</div>
          <div>
            <h3>${item.title}</h3>
            <p>${item.description}</p>
          </div>
          <div>
            <span class="badge ${item.status === "done" ? "done" : item.status === "blocked" ? "blocked" : item.status === "risk" ? "risk" : ""}">${item.date}</span>
          </div>
        </div>
      `).join("");

      return `
        <article class="card pad span-5">
          <div class="section-head">
            <h2>Release path</h2>
            <span class="small">4-week pilot runway</span>
          </div>
          <div class="timeline">${rows}</div>
        </article>
      `;
    }

    function renderRisks() {
      const items = filteredRisks();
      const rows = items.map((risk) => `
        <div class="risk-item">
          <strong>${risk.title} · ${risk.severity}</strong>
          <p>${risk.detail}</p>
          <p class="small">${areaLabel[risk.area]} · ${statusLabel[risk.status]}</p>
        </div>
      `).join("");

      return `
        ${renderMetrics(filteredModules())}
        <article class="card pad span-7">
          <div class="section-head">
            <h2>Top risks</h2>
            <span class="small">${items.length} visible</span>
          </div>
          <div class="risk-list">${rows || `<p class="small">No risks match the current filters.</p>`}</div>
        </article>
        ${renderTimeline()}
      `;
    }

    function renderDecisionTable() {
      const rows = decisions
        .filter((item) => {
          const query = state.query.trim().toLowerCase();
          return !query || Object.values(item).join(" ").toLowerCase().includes(query);
        })
        .map((item) => `
          <tr>
            <td><strong>${item.decision}</strong></td>
            <td>${item.owner}</td>
            <td>${item.status}</td>
            <td>${item.rationale}</td>
          </tr>
        `).join("");

      return `
        <article class="card span-8">
          <div class="section-head" style="padding: 18px 18px 0;">
            <h2>Decision log</h2>
            <span class="small">Production-readiness decisions</span>
          </div>
          <table class="decision-table">
            <thead>
              <tr>
                <th>Decision</th>
                <th>Owner</th>
                <th>Status</th>
                <th>Rationale</th>
              </tr>
            </thead>
            <tbody>${rows || `<tr><td colspan="4">No decisions match the current search.</td></tr>`}</tbody>
          </table>
        </article>
      `;
    }

    function renderOwners() {
      const owners = [
        ["Agent build", "Owns topic flow and variable continuity."],
        ["Knowledge", "Owns grounding sources and freshness cadence."],
        ["Document automation", "Owns template population and editable output."],
        ["Release", "Owns pilot gates, acceptance criteria, and support path."],
      ];

      return `
        <article class="card pad span-4">
          <div class="section-head">
            <h2>Ownership map</h2>
            <span class="small">Core lanes</span>
          </div>
          <div class="owner-grid">
            ${owners.map(([name, detail]) => `<div class="owner"><strong>${name}</strong><span>${detail}</span></div>`).join("")}
          </div>
        </article>
      `;
    }

    function renderOverview() {
      const items = filteredModules();
      return `
        ${renderMetrics(items)}
        ${renderModules(items)}
        ${renderAreaChart(items)}
        ${renderTimeline()}
        ${renderOwners()}
      `;
    }

    function renderDelivery() {
      const items = filteredModules();
      return `
        ${renderMetrics(items)}
        ${renderModules(items)}
        ${renderAreaChart(items)}
        ${renderDecisionTable()}
        ${renderOwners()}
      `;
    }

    function renderDecisions() {
      return `
        ${renderDecisionTable()}
        ${renderOwners()}
        ${renderModules(filteredModules())}
      `;
    }

    function render() {
      if (state.tab === "delivery") {
        dashboard.innerHTML = renderDelivery();
      } else if (state.tab === "risks") {
        dashboard.innerHTML = renderRisks();
      } else if (state.tab === "decisions") {
        dashboard.innerHTML = renderDecisions();
      } else {
        dashboard.innerHTML = renderOverview();
      }
    }

    searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    statusFilter.addEventListener("change", (event) => {
      state.status = event.target.value;
      render();
    });

    areaFilter.addEventListener("change", (event) => {
      state.area = event.target.value;
      render();
    });

    resetButton.addEventListener("click", () => {
      state.query = "";
      state.status = "all";
      state.area = "all";
      searchInput.value = "";
      statusFilter.value = "all";
      areaFilter.value = "all";
      render();
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        state.tab = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle("active", item === tab));
        render();
      });
    });

    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      document.documentElement.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    });

    render();
  </script>
</body>
</html>
